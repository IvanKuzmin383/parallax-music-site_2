# Фрагмент для /etc/nginx/sites-available/parallaxmusic
# Кэш ответов /_next/image (Sharp в Node) — меньше повторной нагрузки на CPU.
#
# Перед включением:
#   mkdir -p /var/cache/nginx/next_image
#   chown www-data:www-data /var/cache/nginx/next_image
#   nginx -t && systemctl reload nginx
#
# Проверка: дважды открыть одну и ту же картинку — заголовок X-Cache-Status: HIT

proxy_cache_path /var/cache/nginx/next_image
    levels=1:2
    keys_zone=next_image:10m
    max_size=2g
    inactive=30d
    use_temp_path=off;

# Внутри server { ... } (рядом с location /):

location /_next/image {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_cache next_image;
    proxy_cache_valid 200 30d;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_lock on;
    proxy_cache_key "$request_uri";

    add_header X-Cache-Status $upstream_cache_status always;
}
